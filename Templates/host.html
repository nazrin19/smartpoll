<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartPoll — Host Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-[#0F0F0F] text-white p-8">
    <div class="max-w-4xl mx-auto">
        
        <div class="bg-[#1A1A1A] p-6 rounded-2xl mb-8 border border-[#2A2A2A] text-center">
            <p class="text-gray-500 text-xs mb-1 uppercase tracking-widest">Your Room Code</p>
            <h1 id="roomDisp" class="text-5xl font-black text-[#7F77DD] tracking-tighter">------</h1>
        </div>

        <div id="setup" class="bg-[#1A1A1A] p-8 rounded-3xl border border-[#2A2A2A] shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">1. Create Your Questions</h2>
            
            <div class="mb-6">
                <label class="block text-sm text-gray-400 mb-2">Question Text</label>
                <input type="text" id="qIn" placeholder="e.g. Which fruit do you prefer?" 
                       class="w-full bg-black border border-[#2A2A2A] p-4 rounded-xl text-white outline-none focus:border-[#7F77DD] transition-all">
            </div>
            
            <div class="mb-2 flex justify-between items-end">
                <label class="text-sm text-gray-400">Options & Branching</label>
                <span class="text-[10px] text-gray-500 uppercase">Next Q# (Leave empty to end)</span>
            </div>

            <div id="optsList" class="space-y-3 mb-4">
                </div>
            
            <button onclick="addOpt()" class="text-[#7F77DD] text-sm font-bold hover:underline transition-all">+ Add Another Option</button>
            
            <div class="mt-10 pt-6 border-t border-[#2A2A2A] flex gap-4">
                <button onclick="saveQ()" class="flex-1 bg-[#2A2A2A] hover:bg-[#3A3A3A] py-4 rounded-xl font-bold transition-all">
                    Save Question
                </button>
                <button onclick="start()" id="startBtn" disabled 
                        class="flex-1 bg-[#7F77DD] py-4 rounded-xl font-bold opacity-30 cursor-not-allowed transition-all">
                    Launch Poll →
                </button>
            </div>

            <div id="qQueue" class="mt-8 space-y-2"></div>
        </div>

        <div id="live" class="hidden bg-[#1A1A1A] p-10 rounded-3xl border-2 border-[#7F77DD] shadow-[0_0_50px_rgba(127,119,221,0.2)]">
            <div class="flex justify-between items-center mb-8">
                <h2 id="liveQ" class="text-3xl font-bold"></h2>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Live</span>
                </div>
            </div>
            <div id="liveResults" class="space-y-6"></div>
            <p class="text-gray-500 text-sm mt-12 text-center italic">Branching logic is active. Participants see questions based on their choices.</p>
        </div>
    </div>

    <script>
        const socket = io();
        let roomCode = "";
        let questions = [];

        window.onload = async () => {
            try {
                const res = await fetch('/create_room', {method:'POST'});
                const data = await res.json();
                roomCode = data.code;
                document.getElementById('roomDisp').innerText = roomCode;
                socket.emit('join', {room: roomCode});
                // Initialize with 2 empty options
                addOpt(); addOpt();
            } catch(e) { console.error("Could not create room", e); }
        };

        function addOpt() {
            const container = document.getElementById('optsList');
            const div = document.createElement('div');
            div.className = "flex gap-3 group";
            div.innerHTML = `
                <input type="text" placeholder="Option (e.g. Apple)" 
                       class="opt-text flex-1 bg-black border border-[#2A2A2A] p-4 rounded-xl focus:border-[#7F77DD] outline-none">
                <input type="number" placeholder="→ Q#" 
                       class="opt-next w-20 bg-black border border-[#2A2A2A] p-4 rounded-xl text-center focus:border-[#7F77DD] outline-none" 
                       min="1">
                <button onclick="this.parentElement.remove()" class="text-gray-600 hover:text-red-500 px-2 font-bold text-xl">&times;</button>
            `;
            container.appendChild(div);
        }

        function saveQ() {
            const qTextInput = document.getElementById('qIn');
            const text = qTextInput.value.trim();
            const optElements = document.querySelectorAll('#optsList > div');
            
            const options = Array.from(optElements).map(el => {
                const label = el.querySelector('.opt-text').value.trim();
                const nextVal = el.querySelector('.opt-next').value;
                return {
                    label: label,
                    next: nextVal ? parseInt(nextVal) - 1 : null // Convert to 0-based index
                };
            }).filter(o => o.label !== "");

            if(text === "" || options.length < 2) {
                alert("Please enter a question and at least 2 options.");
                return;
            }

            questions.push({text, options});
            
            // UI Updates
            renderQueue();
            qTextInput.value = "";
            document.getElementById('optsList').innerHTML = "";
            addOpt(); addOpt();
            
            const btn = document.getElementById('startBtn');
            btn.disabled = false;
            btn.classList.remove('opacity-30', 'cursor-not-allowed');
        }

        function renderQueue() {
            const queue = document.getElementById('qQueue');
            queue.innerHTML = `<p class="text-xs text-gray-500 mb-2 uppercase">Saved Questions:</p>` + 
                questions.map((q, i) => `
                <div class="bg-black border border-[#2A2A2A] p-3 rounded-xl text-sm flex justify-between">
                    <span><span class="text-[#7F77DD] font-bold">Q${i+1}:</span> ${q.text}</span>
                    <span class="text-gray-600">${q.options.length} options</span>
                </div>
            `).join('');
        }

        async function start() {
            if(questions.length === 0) return;

            await fetch('/start_poll', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({code: roomCode, questions})
            });

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('live').classList.remove('hidden');
            
            // Send the first question
            socket.emit('next_question', {room: roomCode, index: 0});
            document.getElementById('liveQ').innerText = questions[0].text;
            renderResultsUI(questions[0]);
        }

        function renderResultsUI(q) {
            const resDiv = document.getElementById('liveResults');
            resDiv.innerHTML = q.options.map(o => `
                <div class="bg-black border border-[#2A2A2A] p-5 rounded-2xl flex justify-between items-center">
                    <span class="font-medium text-lg">${o.label}</span>
                    <span id="v-${o.label}" class="text-2xl font-black text-[#7F77DD]">0</span>
                </div>
            `).join('');
        }

        socket.on('update_votes', (votes) => {
            for(const [ans, count] of Object.entries(votes)) {
                const el = document.getElementById(`v-${ans}`);
                if(el) el.innerText = count;
            }
        });
    </script>
</body>
</html>
