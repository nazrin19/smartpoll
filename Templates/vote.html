<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPoll — Vote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-[#0F0F0F] text-white min-h-screen flex items-center justify-center p-6">
    
    <div id="app" class="max-w-md w-full bg-[#1A1A1A] border border-[#2A2A2A] p-8 rounded-3xl text-center shadow-2xl">
        
        <div id="wait">
            <div class="w-12 h-12 border-4 border-[#7F77DD] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p id="statusText" class="text-gray-400">Connecting to room...</p>
        </div>

        <div id="poll" class="hidden text-left">
            <p class="text-[#7F77DD] text-xs font-bold uppercase tracking-widest mb-2 text-center">Live Question</p>
            <h2 id="qText" class="text-2xl font-bold mb-8 text-center leading-tight"></h2>
            <div id="btnGrid" class="space-y-4"></div>
        </div>

        <div id="done" class="hidden">
            <div class="text-5xl mb-4">✨</div>
            <h2 class="text-xl font-bold">Thank you!</h2>
            <p class="text-gray-500 mt-2">Your path in this poll is complete.</p>
            <button onclick="window.location.href='/'" class="mt-6 text-[#7F77DD] text-sm font-bold hover:underline">Return Home</button>
        </div>

    </div>

    <script>
        // 1. Initialize Socket
        const socket = io();
        
        // 2. Get Room Code from URL (e.g., ?room=ABC123)
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room');

        if (!roomCode) {
            alert("No room code found! Redirecting to home.");
            window.location.href = "/";
        }

        // 3. The Handshake: Join room ONLY after connection is confirmed
        socket.on('connect', () => {
            console.log("Connected to server. Joining room:", roomCode);
            socket.emit('join', { room: roomCode });
            document.getElementById('statusText').innerText = "Waiting for host to launch...";
        });

        // 4. The Listener: Wait for the server to push a question
        socket.on('new_question', (data) => {
            console.log("New question received:", data);
            
            // If data is null or empty, the poll is over for this branch
            if (!data) {
                showElement('done');
                return;
            }

            // Otherwise, show the question and build buttons
            showElement('poll');
            document.getElementById('qText').innerText = data.text;
            
            const grid = document.getElementById('btnGrid');
            grid.innerHTML = ""; // Clear old buttons
            
            data.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = "w-full py-4 bg-[#7F77DD] rounded-2xl font-bold text-lg hover:bg-opacity-90 active:scale-95 transition-all shadow-lg";
                btn.innerText = opt.label;
                
                btn.onclick = () => {
                    // Send the vote and the next branch index back to Flask
                    socket.emit('submit_vote', {
                        room: roomCode,
                        answer: opt.label,
                        next_index: opt.next // This powers the branching!
                    });
                    
                    // Show the waiting screen until the NEXT branched question arrives
                    showElement('wait');
                    document.getElementById('statusText').innerText = "Recording your choice...";
                };
                grid.appendChild(btn);
            });
        });

        // Helper function to switch between UI states
        function showElement(id) {
            ['wait', 'poll', 'done'].forEach(el => {
                document.getElementById(el).classList.toggle('hidden', el !== id);
            });
        }

        // Error Handling
        socket.on('connect_error', () => {
            document.getElementById('statusText').innerText = "Connection lost. Reconnecting...";
            document.getElementById('statusText').classList.add('text-red-500');
        });
    </script>
</body>
</html>
