<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartPoll - Vote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        .option-btn:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-[#0F0F0F] text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div id="app-container" class="w-full max-w-xl">
        
        <div id="status-container" class="text-center">
            <div id="loader" class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#7F77DD] mx-auto mb-4"></div>
            <h2 id="status-message" class="text-xl font-medium text-gray-400">Connecting to room...</h2>
        </div>

        <div id="question-container" class="hidden">
            <div class="bg-[#1A1A1A] border border-[#2A2A2A] rounded-3xl p-8 shadow-2xl">
                <span class="text-[#7F77DD] text-xs font-bold uppercase tracking-widest">Question</span>
                <h1 id="question-text" class="text-2xl font-bold mt-2 mb-8 leading-tight">---</h1>
                <div id="options-grid" class="grid grid-cols-1 gap-4"></div>
            </div>
        </div>

        <div id="finished-container" class="hidden text-center">
            <div class="text-6xl mb-6">🎉</div>
            <h1 class="text-3xl font-bold mb-2">Thank You!</h1>
            <p class="text-gray-500">Your responses have been saved.</p>
            <button onclick="window.location.href='/'" class="mt-8 text-[#7F77DD] font-bold">← Back Home</button>
        </div>
    </div>

    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room');
        let currentIdx = 0;

        // --- NEW: VOTER IDENTITY LOGIC ---
        // Check if this browser already has a unique ID, if not, create one.
        let myVoterID = localStorage.getItem('smartpoll_voter_id');
        if (!myVoterID) {
            myVoterID = 'voter-' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('smartpoll_voter_id', myVoterID);
        }

        if (roomCode) {
            socket.emit('join', { room: roomCode, type: 'voter' });
        } else {
            showError("No room code found.");
        }

        socket.on('error_message', (data) => showError(data.msg));

        // NEW: Listen for the "Already Voted" error from the server
        socket.on('vote_error', (data) => {
            alert(data.msg);
            // We show the loading screen again or redirect them to keep things clean
            showLoading("Checking your status...");
        });

        socket.on('new_question', (data) => {
            if (!data) {
                showFinished();
                return;
            }
            renderQuestion(data);
        });

        function renderQuestion(data) {
            document.getElementById('status-container').classList.add('hidden');
            document.getElementById('finished-container').classList.add('hidden');
            document.getElementById('question-container').classList.remove('hidden');

            document.getElementById('question-text').innerText = data.text;
            currentIdx = data.index;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';

            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full bg-[#2A2A2A] hover:bg-[#3A3A3A] text-left p-5 rounded-2xl border border-transparent hover:border-[#7F77DD] transition-all font-medium";
                
                btn.innerText = opt.label || "Option";
                
                btn.onclick = () => {
                    // --- UPDATED: SENDING THE VOTER ID ---
                    socket.emit('submit_vote', {
                        room: roomCode,
                        answer: opt.label, 
                        current_index: currentIdx,
                        next_index: opt.next,
                        voter_id: myVoterID  // This matches the v_id in app.py
                    });
                    showLoading("Submitting your vote...");
                };
                grid.appendChild(btn);
            });
        }

        function showLoading(msg) {
            document.getElementById('question-container').classList.add('hidden');
            document.getElementById('status-container').classList.remove('hidden');
            document.getElementById('status-message').innerText = msg;
        }

        function showError(msg) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('status-message').innerText = msg;
            document.getElementById('status-message').classList.add('text-red-500');
            setTimeout(() => { window.location.href = '/'; }, 3000);
        }

        function showFinished() {
            document.getElementById('status-container').classList.add('hidden');
            document.getElementById('question-container').classList.add('hidden');
            document.getElementById('finished-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
