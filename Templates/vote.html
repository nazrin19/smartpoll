<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartPoll — Vote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-[#0F0F0F] text-white min-h-screen flex flex-col items-center justify-center p-6">
    
    <div class="mb-6 w-full max-w-md">
        <a href="/" class="text-gray-500 hover:text-white text-xs font-bold">← Exit to Home</a>
    </div>

    <div id="app" class="max-w-md w-full bg-[#1A1A1A] border border-[#2A2A2A] p-8 rounded-3xl text-center shadow-2xl">
        <div id="wait">
            <div id="spinner" class="w-12 h-12 border-4 border-[#7F77DD] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p id="status" class="text-gray-400">Waiting for poll to start...</p>
        </div>
        <div id="poll" class="hidden text-left">
            <h2 id="qText" class="text-2xl font-bold mb-8 text-center"></h2>
            <div id="btnGrid" class="space-y-4"></div>
        </div>
        <div id="done" class="hidden">
            <h2 class="text-xl font-bold text-green-500 mb-2">Vote Recorded!</h2>
            <p class="text-gray-400 mb-6">Thank you for participating.</p>
            <a href="/" class="bg-[#2A2A2A] px-6 py-2 rounded-full text-xs font-bold">Back to Home</a>
        </div>
    </div>

    <script>
        const socket = io();
        const roomCode = new URLSearchParams(window.location.search).get('room');
        let currentTheme = "#7F77DD";

        function joinPoll() {
            if(roomCode) socket.emit('join', {room: roomCode, type: 'voter'});
        }

        socket.on('connect', joinPoll);
        socket.on('poll_started', joinPoll);

        socket.on('apply_theme', (d) => {
            currentTheme = d.color;
            document.getElementById('spinner').style.borderColor = d.color;
            document.getElementById('spinner').style.borderTopColor = "transparent";
        });

        socket.on('new_question', (data) => {
            if(!data) { show('done'); return; }
            show('poll');
            document.getElementById('qText').innerText = data.text;
            const grid = document.getElementById('btnGrid');
            grid.innerHTML = "";
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full py-4 rounded-2xl font-bold transition-all active:scale-95";
                btn.style.backgroundColor = currentTheme;
                btn.innerText = opt.label;
                btn.onclick = () => {
                    socket.emit('submit_vote', { room: roomCode, answer: opt.label, current_index: data.index, next_index: opt.next });
                    show('wait');
                    document.getElementById('status').innerText = "Submitting...";
                };
                grid.appendChild(btn);
            });
        });

        function show(id) {
            ['wait', 'poll', 'done'].forEach(el => document.getElementById(el).classList.toggle('hidden', el !== id));
        }
    </script>
</body>
</html>
