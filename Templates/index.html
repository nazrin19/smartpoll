<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartPoll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#7F77DD', dark: '#0F0F0F', card: '#1A1A1A', border: '#2A2A2A' } } } }
    </script>
</head>
<body class="bg-dark text-white min-h-screen flex flex-col">
    <nav class="border-b border-border px-8 py-4 flex justify-between">
        <div class="text-xl font-bold">Smart<span class="text-primary">Poll</span></div>
    </nav>
    <main class="flex-1 flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl font-bold mb-6">Live polling with <span class="text-primary">branching logic</span></h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl">
            <div class="bg-card border border-border p-8 rounded-2xl hover:border-primary transition">
                <h2 class="text-xl font-bold mb-4">Host a Poll</h2>
                <a href="/host" class="block bg-primary py-3 rounded-xl font-bold">Create Room →</a>
            </div>
            <div class="bg-card border border-border p-8 rounded-2xl hover:border-primary transition">
                <h2 class="text-xl font-bold mb-4">Join a Poll</h2>
                <input type="text" id="joinCode" maxlength="6" placeholder="CODE" class="w-full bg-dark border border-border rounded-xl px-4 py-3 mb-3 text-center uppercase">
                <button onclick="join()" class="w-full bg-white text-dark py-3 rounded-xl font-bold">Join Room</button>
            </div>
        </div>
    </main>
    <script>
        function join() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if(code.length === 6) window.location.href = `/vote?room=${code}`;
            else alert("Enter 6-digit code");
        }
    </script>
</body>
</html>
